<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="text-wall" id="textWall"></div>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="Bomb.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral">
      <button type="button" slot="hotspot-red-button" class="button-hotspot" data-position="0.1m 0.17m 0.08m" arial-label="Red button" link="https://manuelschellhase.github.io/Bomb3D/photo.html">
        <div class="hotspot-button"></div>
      </button>
    </model-viewer>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <script>
      const wall = document.getElementById('textWall');
      const sentence = "DON'T PRESS THE BUTTON!";

      for (let i = 0; i < 25; i++) {
        const row = document.createElement('div');
        row.className = "row";
        row.textContent = sentence;
        wall.appendChild(row);
      }
    </script>
  </body>
</html>
